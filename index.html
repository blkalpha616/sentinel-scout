<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sentinel Scout v2.0</title>
    <style>
        body { background-color: #050505; color: #00ff41; font-family: 'Courier New', monospace; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; margin: 0; padding: 20px; box-sizing: border-box; }
        .scanner-box { border: 1px solid #00ff41; padding: 30px; border-radius: 8px; box-shadow: 0 0 15px rgba(0, 255, 65, 0.2); width: 100%; max-width: 500px; text-align: center; }
        h1 { font-size: 1.2rem; letter-spacing: 2px; margin-bottom: 20px; color: #fff; text-shadow: 0 0 5px #00ff41; }
        input { width: 100%; padding: 12px; margin-bottom: 20px; background: #111; border: 1px solid #00ff41; color: #00ff41; box-sizing: border-box; outline: none; }
        button { background: #00ff41; color: #000; border: none; padding: 12px 25px; font-weight: bold; cursor: pointer; width: 100%; text-transform: uppercase; transition: 0.3s; }
        button:hover { background: #fff; box-shadow: 0 0 20px #fff; }
        #output { margin-top: 25px; text-align: left; font-size: 0.9rem; line-height: 1.4; border-top: 1px dashed #333; padding-top: 15px; min-height: 50px; }
        .loading { color: #ffff00; font-style: italic; }
    </style>
</head>
<body>

<div class="scanner-box">
    <h1>SENTINEL INTERCEPTOR</h1>
    <p style="font-size: 0.8rem; margin-bottom: 20px;">READY FOR DEPLOYMENT, MY LORD.</p>
    
    <input type="text" id="targetUrl" placeholder="PASTE TRANSMISSION URL...">
    <button onclick="runScan()">Initiate Intercept</button>

    <div id="output">SYSTEM STATUS: NOMINAL</div>
</div>

<script>
    // --- THE SACRED BRIDGE ---
    // Update this link whenever you restart sc_controller.py
    const bridge = "https://wrestling-checklist-submitted-myers.trycloudflare.com/scan";

    async function runScan() {
        const url = document.getElementById('targetUrl').value;
        const output = document.getElementById('output');

        if (!url) {
            output.innerHTML = "<span style='color: #ff3333;'>ERROR: NO COORDINATES DETECTED.</span>";
            return;
        }

        output.innerHTML = "<span class='loading'>TRANSMITTING TO ALIENWARE... PLEASE WAIT.</span>";

        try {
            const response = await fetch(`${bridge}?url=${encodeURIComponent(url)}`);
            const data = await response.json();
            
            output.innerHTML = `<strong style="color: #fff;">ANALYSIS COMPLETE:</strong><br><br>${data.analysis}`;
        } catch (err) {
            output.innerHTML = "<span style='color: #ff3333;'>CRITICAL ERROR: THE BRAIN IS UNREACHABLE.</span><br><br>Check the bridge link in Line 35, My Lord.";
        }
    }
</script>

</body>
</html>
