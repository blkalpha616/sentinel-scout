<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sentinel Scout v2.0</title>
    <style>
        body { background-color: #0a0a0a; color: #00ff00; font-family: 'Courier New', Courier, monospace; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .container { border: 2px solid #00ff00; padding: 2rem; border-radius: 10px; box-shadow: 0 0 20px #00ff00; text-align: center; width: 85%; max-width: 600px; }
        input { width: 90%; padding: 12px; margin: 15px 0; background: #1a1a1a; border: 1px solid #00ff00; color: #00ff00; outline: none; font-family: inherit; }
        button { background: #00ff00; color: #000; border: none; padding: 12px 24px; cursor: pointer; font-weight: bold; font-family: inherit; text-transform: uppercase; }
        button:hover { background: #00cc00; box-shadow: 0 0 10px #00ff00; }
        #status { margin-top: 25px; padding: 15px; border-top: 1px solid #333; min-height: 100px; white-space: pre-wrap; font-size: 0.9rem; text-align: left; }
        .glitch { font-size: 1.8rem; text-shadow: 2px 2px #004400; margin-bottom: 0.5rem; }
    </style>
</head>
<body>
    <div class="container">
        <div class="glitch">SENTINEL SCOUT v2.0</div>
        <p><i>Awaiting your command, My Lord.</i></p>
        
        <input type="text" id="videoUrl" placeholder="PASTE TARGET URL HERE...">
        <br>
        <button onclick="initiateScan()">Initiate Intercept</button>
        
        <div id="status">STATUS: Systems Nominal. Bridge standing by.</div>
    </div>

    <script>
        // --- THE BRIDGE PROTOCOL ---
        // My Lord, update this address whenever the Alienware terminal gives you a new one.
        const bridgeUrl = "https://britain-bags-panels-actions.trycloudflare.com";

        async function initiateScan() {
            const urlInput = document.getElementById('videoUrl').value;
            const statusDiv = document.getElementById('status');

            if (!urlInput) {
                statusDiv.innerHTML = "<span style='color: #ff0000;'>CRITICAL: No target coordinates provided, My Lord.</span>";
                return;
            }

            statusDiv.innerText = "TRANSMISSION: Routing through Cloudflare to Alienware...";

            try {
                // Testing the link provided in Image 2ab82cb5
                const response = await fetch(`${bridgeUrl}/scan?url=${encodeURIComponent(urlInput)}`);
                
                if (!response.ok) throw new Error("Bridge Refused Connection");
                
                const data = await response.json();
                
                statusDiv.innerHTML = `<strong>VERDICT RENDERED:</strong>\n\n${data.analysis}`;
            } catch (err) {
                statusDiv.innerHTML = `<span style='color: #ff0000;'>ERROR: The Bridge is broken.</span>\n\nEnsure the address in the script matches the [MISSION CRITICAL] link on your Alienware, My Lord.`;
                console.error("Intercept Failed:", err);
            }
        }
    </script>
</body>
</html>
