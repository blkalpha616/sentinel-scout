<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sentinel Global v2.0</title>
    <style>
        body { background-color: #050505; color: #00ff41; font-family: 'Courier New', monospace; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; margin: 0; padding: 20px; text-align: center; }
        .box { border: 1px solid #00ff41; padding: 25px; border-radius: 8px; width: 100%; max-width: 500px; box-shadow: 0 0 20px rgba(0,255,65,0.2); }
        input { width: 100%; padding: 12px; margin: 10px 0; background: #111; border: 1px solid #00ff41; color: #00ff41; box-sizing: border-box; }
        button { background: #00ff41; color: #000; border: none; padding: 12px; width: 100%; cursor: pointer; font-weight: bold; margin-top: 10px; }
        #status { margin-top: 20px; font-size: 0.8rem; border-top: 1px solid #222; padding-top: 10px; text-align: left; }
    </style>
</head>
<body>
    <div class="box">
        <h1>SENTINEL GLOBAL</h1>
        <p><i>Permanent Tactical Interface</i></p>

        <input type="text" id="bridgeInput" placeholder="Enter Bridge Link (e.g. name.trycloudflare.com)">
        <button onclick="saveBridge()">LOCK BRIDGE ADDRESS</button>
        
        <hr style="border: 0.5px solid #222; margin: 20px 0;">

        <input type="text" id="targetUrl" placeholder="PASTE VIDEO URL TO SCAN...">
        <button onclick="runScan()" style="background: #fff;">INITIATE INTERCEPT</button>

        <div id="status">STATUS: Awaiting Bridge Alignment...</div>
    </div>

    <script>
        // Load saved bridge from phone memory
        window.onload = () => {
            const saved = localStorage.getItem('sentinel_bridge');
            if (saved) {
                document.getElementById('bridgeInput').value = saved;
                document.getElementById('status').innerText = "STATUS: Bridge Locked & Loaded.";
            }
        };

        function saveBridge() {
            const val = document.getElementById('bridgeInput').value;
            localStorage.setItem('sentinel_bridge', val);
            alert("Bridge Saved to Device, My Lord.");
            document.getElementById('status').innerText = "STATUS: Bridge Updated.";
        }

        async function runScan() {
            const bridge = localStorage.getItem('sentinel_bridge');
            const target = document.getElementById('targetUrl').value;
            const status = document.getElementById('status');

            if (!bridge) { alert("My Lord, you must Lock a Bridge Address first!"); return; }
            
            status.innerText = "TRANSMITTING...";

            try {
                // Auto-corrects the link if you forgot the https or /scan
                let cleanBridge = bridge.replace('https://', '').replace('/scan', '');
                const response = await fetch(`https://${cleanBridge}/scan?url=${encodeURIComponent(target)}`);
                const data = await response.json();
                status.innerHTML = `<b>VERDICT:</b><br>${data.analysis}`;
            } catch (err) {
                status.innerHTML = "<span style='color:red;'>ERROR: Alienware is Offline or Bridge is Incorrect.</span>";
            }
        }
    </script>
</body>
</html>
